{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="login-shell">
  <form class="login-card" method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="mb-3">
      <p class="eyebrow-label mb-1">Доступ к системе</p>
      <h1 class="h4 mb-1">Вход</h1>
      <p class="text-muted mb-0">Используйте логин и пароль, выданные администратором.</p>
    </div>
    <div class="mb-3">
      <label class="form-label" for="login">Логин</label>
      <input class="form-control" id="login" name="login" autocomplete="username" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Пароль</label>
      <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">Войти</button>
  </form>
</div>
{% endblock %}
