{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="login-shell">
  <form class="login-card" method="post" action="/password">
    <div class="mb-3">
      <p class="eyebrow-label mb-1">Профиль</p>
      <h1 class="h4 mb-1">Смена пароля</h1>
      <p class="text-muted mb-0">{{ current_user.full_name }} · {{ current_user.login }}</p>
    </div>
    <div class="mb-3">
      <label class="form-label" for="current_password">Текущий пароль</label>
      <input class="form-control" id="current_password" name="current_password" type="password" autocomplete="current-password" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label" for="new_password">Новый пароль</label>
      <input class="form-control" id="new_password" name="new_password" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <div class="mb-3">
      <label class="form-label" for="new_password_confirm">Повторите новый пароль</label>
      <input class="form-control" id="new_password_confirm" name="new_password_confirm" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <button class="btn btn-primary w-100" type="submit" data-submitting-text="Меняем пароль...">Сменить пароль</button>
  </form>
</div>
{% endblock %}
